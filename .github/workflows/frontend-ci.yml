name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # This repository intentionally does not track the root npm lockfile.
      - run: npm install --no-package-lock --no-audit --no-fund
      - run: CI=true npm test -- --watchAll=false
      - run: npm run build
