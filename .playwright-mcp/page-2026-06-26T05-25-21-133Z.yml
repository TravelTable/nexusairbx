          - heading "Roblox Studio installation guidance" [level=2] [ref=e56]
          - list [ref=e57]:
            - listitem [ref=e58]: Put GUI behavior in LocalScripts under StarterGui or inside the relevant ScreenGui.
            - listitem [ref=e59]: Use constraints, scale-based sizing, and safe-area padding so mobile screens do not overflow.
            - listitem [ref=e60]: Use RemoteEvents for server-owned data such as currency, inventory, and purchases.
        - generic [ref=e61]:
          - heading "Common mistakes" [level=2] [ref=e62]
          - list [ref=e63]:
            - listitem [ref=e64]: Making a beautiful GUI that depends on hard-coded pixel positions on mobile.
            - listitem [ref=e65]: Changing player currency directly from a LocalScript.
            - listitem [ref=e66]: Duplicating the same button logic across many frames instead of using a small helper.
        - generic [ref=e67]:
          - heading "Debugging guidance" [level=2] [ref=e68]
          - list [ref=e69]:
            - listitem [ref=e70]: Use the emulator sizes in Studio to check phone, tablet, and desktop layouts.
            - listitem [ref=e71]: Print button names when connecting handlers so missed references are visible.
            - listitem [ref=e72]: Check ZIndex and Visible state before assuming a script did not run.
        - generic [ref=e73]:
          - heading "Limitations" [level=2] [ref=e74]
          - list [ref=e75]:
            - listitem [ref=e76]: NexusRBX can script behavior and describe layout, but it cannot inspect your exact UI hierarchy unless you provide it or connect Studio.
            - listitem [ref=e77]: Large interfaces with many screens are better handled as Agent Build so the system can plan component structure.
        - generic [ref=e78]:
          - heading "Safety and responsible use" [level=2] [ref=e79]
          - list [ref=e80]:
            - listitem [ref=e81]: Keep client UI responsive, but keep valuable actions validated on the server.
            - listitem [ref=e82]: Avoid deceptive UI patterns that trick players into purchases or unwanted actions.
