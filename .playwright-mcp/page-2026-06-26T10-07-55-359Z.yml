        - generic [ref=e61]:
          - heading "Roblox Studio installation guidance" [level=2] [ref=e62]
          - list [ref=e63]:
            - listitem [ref=e64]: Put server-authoritative gameplay code in ServerScriptService unless the script must live inside a specific Part or model.
            - listitem [ref=e65]: Create RemoteEvents in ReplicatedStorage when a LocalScript needs UI updates from server state.
            - listitem [ref=e66]: Test with Start Server and multiple clients when a script changes shared game state.
        - generic [ref=e67]:
          - heading "Common mistakes" [level=2] [ref=e68]
          - list [ref=e69]:
            - listitem [ref=e70]: Trusting a LocalScript for currency, inventory, or rewards.
            - listitem [ref=e71]: Forgetting to create the RemoteEvent or folder path referenced by the script.
            - listitem [ref=e72]: Pasting code into the wrong script type and then debugging the wrong problem.
        - generic [ref=e73]:
          - heading "Debugging guidance" [level=2] [ref=e74]
          - list [ref=e75]:
            - listitem [ref=e76]: Read the Output window first and fix the earliest error before changing logic.
            - listitem [ref=e77]: Add temporary print statements around player, character, and object lookups.
            - listitem [ref=e78]: Check that services and objects exist before assuming the generated path is correct.
        - generic [ref=e79]:
          - heading "Limitations" [level=2] [ref=e80]
          - list [ref=e81]:
            - listitem [ref=e82]: Generated code needs Studio testing because every place has different object names and gameplay rules.
            - listitem [ref=e83]: NexusRBX can provide a focused first version, but complex economies or anti-cheat systems need careful review.
        - generic [ref=e84]:
          - heading "Safety and responsible use" [level=2] [ref=e85]
          - list [ref=e86]:
            - listitem [ref=e87]: Keep rewards, purchases, and permissions on the server.
            - listitem [ref=e88]: Avoid scripts that harass players, bypass platform rules, or automate abuse.
